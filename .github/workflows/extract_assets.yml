name: Extract Assets.car

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate input file
        shell: bash
        run: |
          set -euo pipefail

          CAR="layout/Library/Application Support/YTLite.bundle/Assets.car"

          echo "Looking for: $CAR"
          if [[ ! -f "$CAR" ]]; then
            echo "ERROR: Assets.car not found at:"
            echo "  $CAR"
            echo
            echo "Nearby files:"
            find layout -maxdepth 6 -type f 2>/dev/null | sed 's/^/  /' || true
            exit 1
          fi

          ls -l "$CAR"
          file "$CAR" || true

      - name: Install cartool
        shell: bash
        run: |
          set -euo pipefail
          brew tap 0xxd0/tap
          brew install cartool
          which cartool
          cartool || true

      - name: Extract assets
        shell: bash
        run: |
          set -euo pipefail

          CAR="layout/Library/Application Support/YTLite.bundle/Assets.car"
          OUT="extracted_assets"

          mkdir -p "$OUT/raw"

          echo "=== Running cartool ==="
          cartool "$CAR" "$OUT/raw"

          echo "=== Dumping metadata JSON ==="
          xcrun assetutil --info "$CAR" > "$OUT/asset_info.json"

          echo "=== Output tree ==="
          find "$OUT" -type f | sort | tee "$OUT/file-list.txt"

          PNG_COUNT=$(find "$OUT" -type f -iname '*.png' | wc -l | tr -d ' ')
          PDF_COUNT=$(find "$OUT" -type f -iname '*.pdf' | wc -l | tr -d ' ')

          {
            echo "## Extraction summary"
            echo
            echo "- PNG files: $PNG_COUNT"
            echo "- PDF files: $PDF_COUNT"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$PNG_COUNT" -eq 0 && "$PDF_COUNT" -eq 0 ]]; then
            echo "No extracted image files found." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Upload extracted assets
        uses: actions/upload-artifact@v6
        with:
          name: extracted-assets
          path: extracted_assets/
          retention-days: 30
          if-no-files-found: error
