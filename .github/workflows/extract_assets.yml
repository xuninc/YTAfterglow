name: Extract Assets.car

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate Assets.car
        run: |
          set -euo pipefail

          CAR="layout/Library/Application Support/YTLite.bundle/Assets.car"

          if [[ ! -f "$CAR" ]]; then
            echo "ERROR: Assets.car not found"
            find layout -type f | sort
            exit 1
          fi

          ls -l "$CAR"

      - name: Install Rust toolchain
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          source $HOME/.cargo/env
          rustc --version

      - name: Install carutil
        run: |
          source $HOME/.cargo/env
          cargo install carutil

      - name: Extract assets
        run: |
          set -euo pipefail
          source $HOME/.cargo/env

          CAR="layout/Library/Application Support/YTLite.bundle/Assets.car"
          OUT="extracted_assets"

          mkdir -p "$OUT"

          echo "=== Extracting with carutil ==="
          carutil extract "$CAR" "$OUT"

          echo "=== Dump metadata ==="
          xcrun assetutil --info "$CAR" > "$OUT/asset_info.json"

          echo "=== Output files ==="
          find "$OUT" -type f | sort

          COUNT=$(find "$OUT" -type f | wc -l | tr -d ' ')
          echo "Extracted files: $COUNT"

          if [[ "$COUNT" -eq 0 ]]; then
            echo "Nothing extracted"
            exit 1
          fi

      - name: Upload
        uses: actions/upload-artifact@v6
        with:
          name: extracted-assets
          path: extracted_assets/
