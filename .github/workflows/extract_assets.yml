name: Extract Assets.car

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract Assets.car
        run: |
          CAR="layout/Library/Application Support/YTLite.bundle/Assets.car"
          OUT="extracted_assets"
          mkdir -p "$OUT"

          cat > extract.swift << 'SWIFT'
          import Foundation
          import AppKit

          @objc class CUICatalog: NSObject {
              @objc init(url: URL, error: UnsafeMutablePointer<NSError?>?)
              @objc func allImageNames() -> [String]
              @objc func imageWithName(_ name: String, scaleFactor: CGFloat, deviceIdiom: Int) -> CGImage?
          }

          let handle = dlopen("/System/Library/PrivateFrameworks/CoreUI.framework/CoreUI", RTLD_NOW)
          let catalogClass: AnyClass = NSClassFromString("CUICatalog")!

          let carPath = CommandLine.arguments[1]
          let outDir = CommandLine.arguments[2]

          let url = URL(fileURLWithPath: carPath)
          var err: NSError?
          let catalog = (catalogClass as! CUICatalog.Type).init(url: url, error: &err)

          if let e = err { print("Error: \(e)"); exit(1) }

          let names = catalog.allImageNames()
          print("Found \(names.count) images")

          let fm = FileManager.default
          try? fm.createDirectory(atPath: outDir, withIntermediateDirectories: true)

          for name in names {
              for scale in [1, 2, 3] as [CGFloat] {
                  if let img = catalog.imageWithName(name, scaleFactor: scale, deviceIdiom: 0) {
                      let rep = NSBitmapImageRep(cgImage: img)
                      if let data = rep.representation(using: .png, properties: [:]) {
                          let suffix = scale > 1 ? "@\(Int(scale))x" : ""
                          let filename = "\(outDir)/\(name)\(suffix).png"
                          try? data.write(to: URL(fileURLWithPath: filename))
                          print("Extracted: \(name)\(suffix).png")
                      }
                  }
              }
          }
          SWIFT

          # Try Swift approach first
          swift extract.swift "$CAR" "$OUT" 2>&1 || true

          # Fallback: try actool thinning
          xcrun --sdk iphoneos actool \
            --output-format human-readable-text \
            --notices --warnings \
            --export-dependency-info /dev/null \
            --output-partial-info-plist "$OUT/partial.plist" \
            --platform iphoneos \
            --minimum-deployment-target 13.0 \
            --target-device iphone \
            --compress-pngs \
            --compile "$OUT/compiled" "$CAR" 2>&1 || true

          # Also dump JSON info
          xcrun --sdk iphoneos assetutil --info "$CAR" > "$OUT/asset_info.json" 2>/dev/null || true

          echo "=== All extracted files ==="
          find "$OUT" -type f -name "*.png" | sort

      - name: Upload extracted assets
        uses: actions/upload-artifact@v6
        with:
          name: extracted-assets
          path: extracted_assets/
          retention-days: 30
