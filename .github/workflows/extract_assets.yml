name: Extract Assets.car

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate input file
        shell: bash
        run: |
          set -euo pipefail

          CAR="layout/Library/Application Support/YTLite.bundle/Assets.car"

          echo "Looking for: $CAR"
          if [[ ! -f "$CAR" ]]; then
            echo "ERROR: Assets.car not found at:"
            echo "  $CAR"
            echo
            echo "Repo files near the target path:"
            find layout -maxdepth 5 -type f 2>/dev/null | sed 's/^/  /' || true
            exit 1
          fi

          ls -l "$CAR"
          file "$CAR" || true

      - name: Build acextract
        shell: bash
        run: |
          set -euo pipefail

          git clone --recursive https://github.com/bartoszj/acextract.git
          cd acextract
          xcodebuild \
            -project acextract.xcodeproj \
            -scheme acextract \
            -configuration Release \
            build

          BIN="$(find ~/Library/Developer/Xcode/DerivedData -type f -path '*/Build/Products/Release/acextract' | head -n 1)"
          if [[ -z "${BIN:-}" || ! -x "$BIN" ]]; then
            echo "ERROR: acextract binary not found after build"
            exit 1
          fi

          echo "ACEXTRACT_BIN=$BIN" >> "$GITHUB_ENV"
          "$BIN" -h

      - name: Extract Assets.car
        shell: bash
        run: |
          set -euo pipefail

          CAR="layout/Library/Application Support/YTLite.bundle/Assets.car"
          OUT="extracted_assets"

          mkdir -p "$OUT/raw"

          echo "=== Listing CAR contents ==="
          "$ACEXTRACT_BIN" -i "$CAR" -l | tee "$OUT/acextract-list.txt"

          echo "=== Extracting assets ==="
          "$ACEXTRACT_BIN" -i "$CAR" -o "$OUT/raw"

          echo "=== Dumping asset metadata JSON ==="
          xcrun assetutil --info "$CAR" > "$OUT/asset_info.json"

          echo "=== Full output tree ==="
          find "$OUT" -type f | sort | tee "$OUT/file-list.txt"

          PNG_COUNT=$(find "$OUT" -type f -iname '*.png' | wc -l | tr -d ' ')
          echo "PNG_COUNT=$PNG_COUNT" | tee -a "$GITHUB_STEP_SUMMARY"

          if [[ "$PNG_COUNT" -eq 0 ]]; then
            echo "WARNING: No PNG files were extracted." | tee -a "$GITHUB_STEP_SUMMARY"
            echo "This can mean the catalog contains non-raster assets, unsupported variants, or extraction failed."
          fi

      - name: Upload extracted assets
        uses: actions/upload-artifact@v6
        with:
          name: extracted-assets
          path: extracted_assets/
          retention-days: 30
          if-no-files-found: error
